name: Schema Consistency Check
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: schema-consistency-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: money
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: --health-cmd=true --health-interval=5s --health-timeout=1s --health-retries=1
    env:
      GRADLE_OPTS: -Dkotlin.compiler.execution.strategy=in-process -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4500m"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: mysql-clientのインストール
        run: sudo apt-get update -y && sudo apt-get install -y default-mysql-client
      - name: MariaDBの起動を待機
        run: |
          for i in $(seq 1 50); do
            mysql -h 127.0.0.1 -u test -ptest -e "SELECT 1" money 2>/dev/null && echo "MariaDB ready" && exit 0
            echo "Waiting for MariaDB... ($i/50)"
            sleep 3
          done
          echo "MariaDBが起動しませんでした"
          exit 1
      - name: SQLファイルを適用
        run: |
          SQL_DIR="backend/datasource/db/src/jvmMain/resources/sql"
          mysql -h 127.0.0.1 -u test -ptest money < "$SQL_DIR/master.sql"
          for f in $(ls "$SQL_DIR"/*.sql | grep -v "master.sql" | sort); do
            echo "適用中: $f"
            mysql -h 127.0.0.1 -u test -ptest money < "$f"
          done
      - name: jOOQコードを生成
        env:
          DB_USER: test
          DB_PASS: test
        run: ./gradlew :backend:datasource:db:schema:generateDbCode
      - name: スキーマの差分を確認
        run: git diff --exit-code backend/datasource/db/schema/src/jvmMain/kotlin
