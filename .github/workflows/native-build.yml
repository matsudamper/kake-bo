name: Native Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: native-build-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  native_build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dkotlin.compiler.execution.strategy=in-process -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g"
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: GraalVM のセットアップ
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: ネイティブイメージをビルド
        run: ./gradlew :backend:nativeCompile

      - name: Native で JUnit テストを実行
        run: ./gradlew :backend:nativeTest

      - name: ネイティブバイナリの healthz スモークテスト
        run: |
          while IFS= read -r line; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            export "$line"
          done < schema_update_local.env
          export PORT=8080
          export IS_DEBUG=true
          export HTML_PATH=/tmp/html
          mkdir -p /tmp/html
          echo '<html></html>' > /tmp/html/index.html

          ./backend/build/native/nativeCompile/backend &
          SERVER_PID=$!

          TIMEOUT=60
          ELAPSED=0
          until curl -sf --max-time 5 http://localhost:${PORT}/healthz > /dev/null 2>&1; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "サーバー起動がタイムアウトしました (${TIMEOUT}秒)"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          RESPONSE=$(curl -sf --max-time 5 http://localhost:${PORT}/healthz)
          if [ "$RESPONSE" = "ok" ]; then
            echo "healthzチェック成功"
          else
            echo "healthzチェック失敗: $RESPONSE"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null || true

      - name: ネイティブバイナリのアップロード
        uses: actions/upload-artifact@v7
        with:
          name: backend-native-${{ github.sha }}
          path: backend/build/native/nativeCompile/backend
          retention-days: 7
