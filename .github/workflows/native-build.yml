name: Native Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: native-build-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  native_build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dkotlin.compiler.execution.strategy=in-process -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx6g"
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: GraalVM のセットアップ
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: ネイティブイメージをビルド
        run: ./gradlew :backend:nativeCompile

      - name: ネイティブバイナリの healthz スモークテスト
        run: |
          export $(grep -v '^#' schema_update_local.env | xargs)
          export PORT=8080
          export IS_DEBUG=true
          export HTML_PATH=/tmp/html
          mkdir -p /tmp/html
          echo '<html></html>' > /tmp/html/index.html

          SERVER_LOG=backend-native-server.log
          ./backend/build/native/nativeCompile/backend > "$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          echo "サーバーを起動しました (PID: ${SERVER_PID}, PORT: ${PORT})"

          TIMEOUT=60
          ELAPSED=0
          until curl -sf --max-time 5 http://localhost:${PORT}/healthz > /dev/null 2>&1; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "サーバー起動がタイムアウトしました (${TIMEOUT}秒)"
              echo "--- サーバーログ ---"
              cat "$SERVER_LOG" || true
              echo "--- プロセス状態 ---"
              ps -p "$SERVER_PID" 2>/dev/null || echo "プロセスはすでに終了しています"
              echo "--- ポート使用状況 ---"
              ss -tlnp | grep ":${PORT}" || echo "ポート ${PORT} は使用されていません"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          RESPONSE=$(curl -sf --max-time 5 http://localhost:${PORT}/healthz)
          if [ "$RESPONSE" = "ok" ]; then
            echo "healthzチェック成功 (${ELAPSED}秒で起動)"
          else
            echo "healthzチェック失敗: $RESPONSE"
            echo "--- サーバーログ ---"
            cat "$SERVER_LOG" || true
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null || true

      - name: ネイティブバイナリのアップロード
        uses: actions/upload-artifact@v7
        with:
          name: backend-native-${{ github.sha }}
          path: backend/build/native/nativeCompile/backend
          retention-days: 7
