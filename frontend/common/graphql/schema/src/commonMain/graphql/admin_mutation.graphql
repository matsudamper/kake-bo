mutation AdminLogin($password: String!) {
    adminMutation {
        adminLogin(password: $password) {
            isSuccess
        }
    }
}

mutation AdminLogout {
    adminMutation {
        adminLogout
    }
}

mutation AdminAddUser($userName: String!,$password: String!) {
    adminMutation {
        addUser(name: $userName, password: $password) {
            errorType
        }
    }
}

mutation AdminDeleteImages($imageIds: [ImageId!]!) {
    adminMutation {
        deleteImages(imageIds: $imageIds)
    }
}

mutation AdminSearchUsers($query: String!, $size: Int!, $cursor: String) {
    adminMutation {
        searchUsers(input: {query: $query, size: $size, cursor: $cursor}) {
            nodes {
                name
            }
            cursor
            hasMore
        }
    }
}

mutation AdminReplacePassword($userName: String!, $password: String!) {
    adminMutation {
        replacePassword(userName: $userName, password: $password) {
            isSuccess
            errorType
        }
    }
}
