query LoginScreenFidoInfo {
    fidoLoginInfo {
        domain
        challenge
    }
}

query LoginScreenCurrentSession {
    user {
        settings {
            sessionAttributes {
                currentSession {
                    id
                }
            }
        }
    }
}

mutation LoginScreenChangeSessionName($id: SessionRecordId!, $name: String!) {
    userMutation {
        changeSessionName(id: $id, name: $name) {
            isSuccess
        }
    }
}
