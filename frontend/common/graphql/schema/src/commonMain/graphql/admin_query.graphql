query AdminIsLoggedIn {
    isAdminLoggedIn
}

query AdminUnlinkedImages($size: Int!, $cursor: String) {
    adminUnlinkedImages(input: { size: $size, cursor: $cursor }) {
        nodes {
            id
            url
            userId
            userName
        }
        cursor
        hasMore
    }
}

query AdminUnlinkedImagesTotalCount {
    adminUnlinkedImages(input: { size: 0 }) {
        totalCount
    }
}

query AdminImageDirectoryMonths {
    adminImageDirectoryMonths {
        yearMonth
        count
    }
}

query AdminUnlinkedImagesByMonth($yearMonth: String!) {
    adminUnlinkedImagesByMonth(yearMonth: $yearMonth) {
        id
        url
        userId
        userName
    }
}

query AdminSearchUsers($query: String!, $size: Int!, $cursor: String) {
    adminSearchUsers(input: {query: $query, size: $size, cursor: $cursor}) {
        nodes {
            userId
            name
        }
        cursor
        hasMore
    }
}
